# ============================================================
# Ombre Brain Configuration / 配置文件
# Copy this file to config.yaml and modify as needed
# 复制此文件为 config.yaml 后按需修改
# ============================================================

# --- Transport / 传输方式 ---
# stdio: local use (Claude Desktop, direct pipe)
# streamable-http: remote use (HTTP, tunnel/CDN/proxy friendly)
# stdio: 本地使用（Claude Desktop，直接管道通信）
# streamable-http: 远程使用（标准 HTTP，对隧道/CDN/代理友好）
transport: "stdio"

# --- Log level / 日志级别 ---
log_level: "INFO"

# --- Bucket storage path / 记忆桶存储路径 ---
# Point this to your Obsidian vault subdirectory, or any local folder
# 指向你的 Obsidian 仓库子目录，或任意本地文件夹
# Leave as-is to use the built-in ./buckets/ directory
# 保持默认则使用内置的 ./buckets/ 目录
# buckets_dir: "/path/to/your/Obsidian Vault/Ombre Brain"

# --- Merge threshold / 桶合并阈值 ---
# When storing a new memory, if similarity with an existing bucket exceeds
# this value (0-100), merge instead of creating a new one
# 存新记忆时，如果与已有桶的相似度超过此值（0-100），则合并而非新建
merge_threshold: 75

# --- Merge candidate fusion / 合并候选融合 ---
# hold/grow write path uses keyword + vector channels to find duplicate buckets.
# A candidate can merge if keyword score exceeds merge_threshold or vector
# similarity exceeds vector_threshold; protected/feel/chord-tagged domains still
# bypass automatic merge.
merge:
  keyword_limit: 5                # Keyword candidates considered for merge
  vector_limit: 8                 # Vector candidates considered for merge
  vector_floor: 0.50              # Ignore vector noise below this similarity
  vector_threshold: 0.78          # Vector-only merge threshold
  candidate_limit: 8              # Max fused candidates checked after RRF ranking

# --- Dehydration API / 脱水压缩 API 配置 ---
# Uses a cheap LLM for intelligent compression; auto-degrades to local
# keyword extraction if API is unavailable
# 用廉价 LLM 做智能压缩，API 不可用时自动降级到本地关键词提取
dehydration:
  # Supports any OpenAI-compatible API: DeepSeek / Ollama / LM Studio / vLLM / Gemini etc.
  # 支持所有 OpenAI 兼容 API：DeepSeek / Ollama / LM Studio / vLLM / Gemini 等
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  # Common base_url examples / 常见 base_url 示例：
  #   DeepSeek:    https://api.deepseek.com/v1
  #   SiliconFlow: https://api.siliconflow.cn/v1
  #   Ollama:      http://localhost:11434/v1
  #   LM Studio:   http://localhost:1234/v1
  #   vLLM:        http://localhost:8000/v1
  #   Gemini:      https://generativelanguage.googleapis.com/v1beta/openai
  # api_key: ""    # ⚠️ Use env var OMBRE_API_KEY instead / 请使用环境变量 OMBRE_API_KEY
  max_tokens: 1024
  temperature: 0.1

# --- Decay parameters / 记忆衰减参数 ---
# Simulates Ebbinghaus forgetting curve, auto-archives inactive memories
# 模拟艾宾浩斯遗忘曲线，自动归档不活跃的记忆
decay:
  lambda: 0.05                    # Decay rate / 衰减速率（越大遗忘越快）
  threshold: 0.3                  # Archive threshold / 归档阈值
  check_interval_hours: 24        # Check interval (hours) / 衰减检查间隔（小时）
  emotion_weights:
    base: 1.0                     # Base weight / 基础权重
    arousal_boost: 0.8            # Arousal boost coefficient / 唤醒度加成系数
  retrieval:                      # Retrieval-time forgetting curve / 检索期遗忘曲线（breath 检索模式排序）
    half_life_days: 14.0          # Half-life / 半衰期（天），14 天前的记忆衰到 50%
    min_decay: 0.25               # Floor for unresolved / 非 resolved 桶的衰减保底（老记忆不归零）
    weight: 0.4                   # Blend weight / 混入强度 0~1（0=关闭，1=纯乘衰减）
    rehearsal_boost: 0.5          # Rehearsal stretch / 复述拉长半衰系数：half_life×(1+boost×log2(1+激活次数))

# --- Narrative layer / 叙事层（内核 3：Event -> Episode -> Saga）---
# Additive consolidation: clusters recent related buckets into episode summaries,
# then folds episodes into long-running sagas. Never mutates source buckets.
# 只增不改：把最近相关的桶卷成 episode 摘要，再把 episode 归并进长线 saga。绝不碰源桶。
# All values have safe code defaults; this block is optional.
# 所有值代码里都有安全默认，本节点可省。
narrative:
  enabled: true                   # Enable narrative engine / 启用叙事层
  interval_hours: 24              # Cycle interval (hours) / 归并周期间隔（小时）
  min_cluster_size: 3             # Min events to form an episode / 成一个 episode 的最小 event 数
  max_cluster_size: 12            # Max events per episode / 单 episode 最多 event 数
  episode_sim_threshold: 0.78     # Semantic continuity cosine / 语义连续性 cosine 阈值
  episode_span_days: 3.0          # Max time span of one episode / 单 episode 时间跨度上限（天）
  episode_lookback_days: 30.0     # Only narrate events newer than this / 只卷这么多天内的新 event
  max_episodes_per_cycle: 5       # Cap episodes built per cycle / 每轮最多卷几个 episode
  max_episodes_into_saga_per_cycle: 8  # Cap episodes routed to sagas per cycle / 每轮最多归并几个 episode 进 saga

# --- Sense entry layer / 五感入口层（嗅/味/触/听）---
# On write, content describing a smell/taste/touch/sound auto-gets a `sense:` tag.
# On breath, a sensory query lifts same-sense buckets (the Proust hook).
# 写入时带感官描述的内容自动打 sense 标签；breath 时感官 query 让同感官桶上浮（普鲁斯特钩子）。
# 结构化 sensory.spicy/touch 也会映射成 sense 通道（味觉/触觉）：合并时自动补、存量桶用 backfill_senses.py 补。
# All values have safe code defaults; this block is optional.
# Env overrides: OMBRE_SENSE_ENABLED (0/false 关), OMBRE_SENSE_RECALL_BOOST (float)。
sense:
  enabled: true                   # Enable sense tagging + recall boost / 启用感官打标+召回上浮
  recall_boost: 1.25              # Score multiplier for same-sense buckets on a sensory query / 同感官桶召回分乘子

# --- Embedding / 向量化配置 ---
# Uses embedding API for semantic similarity search
# 通过 embedding API 实现语义相似度搜索
# Reuses the same API key (OMBRE_API_KEY) and base_url from dehydration config
# 复用脱水配置的 API key 和 base_url
embedding:
  enabled: true                   # Enable embedding / 启用向量化
  model: "gemini-embedding-001"   # Embedding model / 向量化模型

# --- Scoring weights / 检索权重参数 ---
# total = topic(×4) + emotion(×2) + time(×1.5) + importance(×1)
scoring_weights:
  topic_relevance: 4.0
  emotion_resonance: 2.0
  time_proximity: 1.5
  importance: 1.0

# --- Fuzzy matching / 模糊匹配参数 ---
matching:
  fuzzy_threshold: 50             # Minimum match score (0-100) / 最低匹配分数
  max_results: 5                  # Max results per search / 单次搜索最多返回条数

# --- RRF fusion / RRF 融合检索 ---
# breath 双通道融合参数：keyword (jieba+rapidfuzz) + vector (embedding)
# score(d) = keyword_weight/(k + rank_keyword(d)) + vector_weight/(k + rank_vector(d))
# k 越大相邻 rank 间分差越平缓；权重默认对称（1:1）
# 向量通道有 sim>0.5 硬阈值底线，挡掉高 cosine 噪音
rrf:
  k: 60                           # rank smoothing constant / 排名平滑常数
  keyword_weight: 1.0             # keyword channel weight / 关键词通道权重
  vector_weight: 1.0              # vector channel weight / 向量通道权重

# --- Intent-aware recall / 意图感知检索 ---
# Classify breath(query=...) into fact/recall/relation/temporal, then assign
# channel budgets before the existing RRF merge. The default policy mirrors the
# pre-kernel-4 behavior, so low-confidence queries fall back to current recall.
intent_recall:
  enabled: true
  min_confidence: 0.55
  policies:
    default:
      keyword_top_k_multiplier: 1.0
      vector_top_k_multiplier: 1.0
      keyword_weight_multiplier: 1.0
      vector_weight_multiplier: 1.0
      relation_neighbor_limit: 5
      relation_score_boost: 1.0
      emotion_domain_boost: 1.0
      temporal_recent_boost: 1.0
      temporal_recent_days: 14
    fact:
      keyword_top_k_multiplier: 1.35
      vector_top_k_multiplier: 1.15
      keyword_weight_multiplier: 1.35
      vector_weight_multiplier: 1.10
      relation_neighbor_limit: 1
    recall:
      keyword_top_k_multiplier: 1.0
      vector_top_k_multiplier: 1.25
      keyword_weight_multiplier: 1.0
      vector_weight_multiplier: 1.15
      relation_neighbor_limit: 4
    relation:
      keyword_top_k_multiplier: 1.0
      vector_top_k_multiplier: 1.35
      keyword_weight_multiplier: 0.90
      vector_weight_multiplier: 1.20
      relation_neighbor_limit: 8
      relation_score_boost: 1.20
      emotion_domain_boost: 1.15
    temporal:
      keyword_top_k_multiplier: 1.30
      vector_top_k_multiplier: 0.90
      keyword_weight_multiplier: 1.25
      vector_weight_multiplier: 0.85
      relation_neighbor_limit: 2
      temporal_recent_boost: 1.15
      temporal_recent_days: 14

# --- World axis / 世界轴 ---
# 用来隔离不同剧情世界的记忆。日常聊天的桶 world 留空（不属于任何世界）；
# 角色扮演场景的桶必须标具体 world；跨世界通用设定标 world="通用"，搜哪个世界都跟着出。
#
# breath 默认行为：根据 current_world 过滤。current_world="" 时只出"日常桶 + 通用"，
# 设了具体世界时只出"该世界 + 通用"，日常桶不浮现。breath(world="all") 跳过过滤。
#
# current_world 由 switch_world MCP 工具在运行时改动，写入 {buckets_dir}/.ombre_runtime.yaml。
# 也可用环境变量 OMBRE_CURRENT_WORLD 覆盖。
worlds:
  - 当前世界
  - 旧世界
  - 通用
current_world: ""

# --- Obsidian wikilinks / Obsidian 双链自动注入 ---
wikilink:
  enabled: true
  use_tags: false
  use_domain: true
  use_auto_keywords: true
  auto_top_k: 4
  min_keyword_len: 3
  exclude_keywords: []
